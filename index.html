<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript pamati</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/javascript-logo.png" type="image/x-icon">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>
            <img src="img/javascript-logo.png" alt="JS logo"> JavaScript pamati
        </h1>
    </header>

    <main>
        <section>
            <h2>1. Mainīgie</h2>
            <p>Izmanto <code>let</code> vai <code>const</code> mainīgo definēšanai.</p>
            <button id="btn-variables">Izpildīt</button>
            <div id="variables-output" class="output"></div>
        </section>

        <section>
            <h2>2. Nosacījumi</h2>
            <p>Ievadi savu vecumu un noskaidro, vai vari vadīt auto:</p>
            <input type="text" id="age-input" min="1" max="150" size="8" placeholder="Tavs vecums">

            <br>
            <br>

            <span class="checkbox-2">
            <label for="Tiesibas">Vai jums ir jau tiesības?</label>
            <input type="checkbox" id="tiesibas-check" name="Tiesibas" value=Ja>
            </span>

            <br>
            <br>

            <button id="btn-age">Pārbaudīt</button>
            <div id="age-output" class="output"></div>
        </section>

        <section>
            <h2>3. Cikli</h2>
            <p>Nospied pogu, lai redzētu skaitļus no 1 līdz 20.</p>
            <button id="btn-loop">Rādīt skaitļus</button>
            <div id="loop-output" class="output"></div>
            <hr>

            <p>Izvēlies skaitli no 1 - 10</p>
            <input type="text" id="number-input" min="1" max="10" size="8" placeholder="Skaitlis no 1 līdz 10">

        </section>
    </main>
</body>
</html>
